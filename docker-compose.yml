services: 
  frontend: 
    image: 3453458134/app-frontend
    ports: 
      - "3000:3000" 
    depends_on: 
      - backend 
    networks: 
      - my-net 
  
  backend: 
    image: 3453458134/app-backend 
    ports: 
      - "5000:4000" 
    depends_on:
      - mongo
    networks: 
      - my-net 
  
  mongo:
    image: mongo:latest     
    volumes: 
      - mongo-data:/data/db 
    networks: 
      - my-net
  
volumes:
  mongo-data: 
  
networks: 
  my-net:
